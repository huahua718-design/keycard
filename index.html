<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位預言：鬼牌的亮點</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 啟動遮罩：符合現代瀏覽器安全規範，點擊後同時開啟相機與解鎖震動 */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 25, 0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        .start-btn {
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .start-btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 10px; letter-spacing: 2px;">數位透視眼</h2>
        <p style="margin-bottom: 30px; color: #8892b0; font-size: 14px;">請點擊按鈕允許相機權限並開始儀式</p>
        <button class="start-btn" onclick="startMagic()">開啟透視相機</button>
    </div>

    <a-scene id="magic-scene" 
             mindar-image="imageTargetSrc: ./magic-cards.mind; maxTrack: 2; autoStart: false; filterMinCF:0.001; filterBeta: 0.01;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="joker-target" mindar-image-target="targetIndex: 0"></a-entity>

        <a-entity id="x-target" mindar-image-target="targetIndex: 1">
            
            <a-entity id="magic-light-group" visible="false">
                <a-sphere position="0 0 0.05" radius="0.04" color="#00f2fe"
                          material="shader: flat; emissive: #00f2fe;"
                          animation="property: scale; to: 1.5 1.5 1.5; dir: alternate; loop: true; dur: 300">
                </a-sphere>
                
                <a-sphere position="0 0 0.05" radius="0.12" color="#00f2fe" opacity="0.4"
                          material="shader: flat; transparent: true;"
                          animation="property: scale; to: 0.8 0.8 0.8; dir: alternate; loop: true; dur: 600">
                </a-sphere>

                <a-light type="point" color="#00f2fe" intensity="2" distance="2" position="0 0 0.2"></a-light>
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        let isVibrationAllowed = false;
        let jokerFound = false;
        let xCardFound = false;
        let hasTriggeredVibration = false;

        // 點擊遮罩按鈕
        function startMagic() {
            // 隱藏遮罩
            document.getElementById('overlay').style.display = 'none';
            isVibrationAllowed = true;
            
            // 觸發一次微弱震動，向瀏覽器宣告我們要使用震動功能
            if(navigator.vibrate) navigator.vibrate(50); 
            
            // 手動啟動 MindAR 相機
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 

            // 初始化魔術監聽器
            initMagicLogic();
        }

        function initMagicLogic() {
            const jokerTarget = document.getElementById('joker-target');
            const xTarget = document.getElementById('x-target');
            const lightGroup = document.getElementById('magic-light-group');

            // 監聽：看見鬼牌正面
            jokerTarget.addEventListener("targetFound", () => {
                jokerFound = true;
                checkConditions();
            });

            jokerTarget.addEventListener("targetLost", () => {
                jokerFound = false;
                checkConditions();
            });

            // 監聽：看見寫了 X 的牌背
            xTarget.addEventListener("targetFound", () => {
                xCardFound = true;
                checkConditions();
            });

            xTarget.addEventListener("targetLost", () => {
                xCardFound = false;
                checkConditions();
            });

            // 核心判定：當滿足魔術條件時
            function checkConditions() {
                // 條件：畫面「同時」看見鬼牌正面 與 帶記號的牌背
                if (jokerFound && xCardFound) {
                    // 1. 秀出牌背上的神祕亮點
                    lightGroup.setAttribute('visible', 'true');
                    
                    // 2. 手機震動：設計一個「登、登」兩下充滿預言感的震動
                    // 如果這一次組合還沒震動過，就觸發震動
                    if (isVibrationAllowed && navigator.vibrate && !hasTriggeredVibration) {
                        navigator.vibrate([150, 100, 300]); 
                        hasTriggeredVibration = true; // 避免在畫面上時重複瘋狂震動
                    }
                } else {
                    // 只要其中一個不見（例如鏡頭移開，或是觀眾把牌背翻開了）
                    lightGroup.setAttribute('visible', 'false');
                    
                    // 當牌移開後，重設震動標記，下次重新組合出現時可以再度震動
                    if (!jokerFound && !xCardFound) {
                        hasTriggeredVibration = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
