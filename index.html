<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位預言</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 強制移除 MindAR 的所有內建 UI，保持畫面純淨 */
        .mindar-ui-scanning, .mindar-ui-loading {
            display: none !important;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
        }
        .start-btn {
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #1f1c2c, #928dab);
            color: white;
            border: 1px solid #555;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        /* iOS 專用：全螢幕瞬間閃白效果 */
        #flash-bang {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 9998;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 30px; letter-spacing: 2px;">數位透視眼</h2>
        <button class="start-btn" onclick="startMagic()">開啟透視鏡頭</button>
    </div>

    <div id="flash-bang"></div>

    <a-scene id="magic-scene" 
             mindar-image="imageTargetSrc: ./magic-cards.mind; maxTrack: 2; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF:0.001; filterBeta: 0.01;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="joker-target" mindar-image-target="targetIndex: 0"></a-entity>

        <a-entity id="x-target" mindar-image-target="targetIndex: 1">
            
            <a-entity id="magic-light-group" visible="false">
                
                <a-entity id="scaler-container" scale="5 5 5"
                          animation="property: scale; from: 5 5 5; to: 1 1 1; dur: 3000; easing: easeOutExpo; startEvents: startLocking">
                    
                    <a-ring color="#39ff14" radius-inner="0.41" radius-outer="0.424" position="0 0 0.01" opacity="0.8"
                            material="shader: flat; transparent: true;"
                            animation="property: rotation; to: 0 0 -360; loop: true; dur: 5000; easing: linear">
                    </a-ring>

                    <a-entity position="0 0 0.02"
                              animation="property: rotation; to: 0 0 360; loop: true; dur: 3000; easing: linear">
                        <a-plane color="#39ff14" width="0.6" height="0.02" position="0 0.3 0" material="shader: flat;"></a-plane>
                        <a-plane color="#39ff14" width="0.6" height="0.02" position="0 -0.3 0" material="shader: flat;"></a-plane>
                        <a-plane color="#39ff14" width="0.02" height="0.6" position="-0.3 0 0" material="shader: flat;"></a-plane>
                        <a-plane color="#39ff14" width="0.02" height="0.6" position="0.3 0 0" material="shader: flat;"></a-plane>
                    </a-entity>

                    <a-ring color="#39ff14" radius-inner="0.28" radius-outer="0.3" position="0 0 0.03"
                            material="shader: flat; transparent: true;"
                            animation="property: opacity; from: 0.3; to: 1; dir: alternate; loop: true; dur: 150">
                    </a-ring>


                    <a-entity position="0 0 0.15"
                              animation__rotate="property: rotation; to: 0 0 360; loop: true; dur: 1500; easing: linear"
                              animation__bounce="property: position; from: 0 0 0.15; to: 0 0 0.08; dir: alternate; loop: true; dur: 600; easing: easeInOutQuad">
                        
                        <a-cylinder color="#39ff14" radius="0.02" height="0.15" position="0 0 0.075" rotation="90 0 0" material="shader: flat; emissive: #39ff14;"></a-cylinder>
                        
                        <a-cone color="#39ff14" radius-bottom="0.07" radius-top="0" height="0.1" num-segments="4" position="0 0 0" rotation="-90 0 0" material="shader: flat; emissive: #39ff14;"></a-cone>
                    </a-entity>

                    <a-light type="point" color="#39ff14" intensity="2" distance="1" position="0 0 0.05"></a-light>

                </a-entity>
                
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        let isVibrationAllowed = false;
        let jokerFound = false;
        let xCardFound = false;
        let hasTriggeredVisual = false;
        let androidVibrateInterval = null;

        function startMagic() {
            document.getElementById('overlay').style.display = 'none';
            isVibrationAllowed = true;
            
            if(navigator.vibrate) navigator.vibrate(50); 
            
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 

            initMagicLogic();
        }

        function initMagicLogic() {
            const jokerTarget = document.getElementById('joker-target');
            const xTarget = document.getElementById('x-target');
            const lightGroup = document.getElementById('magic-light-group');
            const container = document.getElementById('scaler-container');
            const flashBang = document.getElementById('flash-bang');

            jokerTarget.addEventListener("targetFound", () => { jokerFound = true; checkConditions(); });
            jokerTarget.addEventListener("targetLost", () => { jokerFound = false; checkConditions(); });
            xTarget.addEventListener("targetFound", () => { xCardFound = true; checkConditions(); });
            xTarget.addEventListener("targetLost", () => { xCardFound = false; checkConditions(); });

            function checkConditions() {
                if (jokerFound && xCardFound) {
                    
                    if (!hasTriggeredVisual) {
                        hasTriggeredVisual = true;

                        lightGroup.setAttribute('visible', 'true');
                        
                        container.setAttribute('scale', '5 5 5');
                        container.emit('startLocking');

                        flashBang.style.transition = "none";
                        flashBang.style.opacity = "1";
                        setTimeout(() => {
                            flashBang.style.transition = "opacity 0.5s ease-out";
                            flashBang.style.opacity = "0";
                        }, 50);

                        if (isVibrationAllowed && navigator.vibrate) {
                            androidVibrateInterval = setInterval(() => {
                                navigator.vibrate(200);
                            }, 500);
                        }
                    }
                } else {
                    lightGroup.setAttribute('visible', 'false');
                    
                    if (!jokerFound && !xCardFound) {
                        hasTriggeredVisual = false;
                        if(androidVibrateInterval) {
                            clearInterval(androidVibrateInterval);
                            androidVibrateInterval = null;
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
