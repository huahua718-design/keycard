<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位預言</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 強制移除 MindAR 的所有內建 UI，保持畫面純淨 */
        .mindar-ui-scanning, .mindar-ui-loading {
            display: none !important;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
        }
        .start-btn {
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #1f1c2c, #928dab);
            color: white;
            border: 1px solid #555;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        /* iOS 專用：全螢幕瞬間閃白效果（替代震動的物理視覺感） */
        #flash-bang {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 9998;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 30px; letter-spacing: 2px;">數位透視眼</h2>
        <button class="start-btn" onclick="startMagic()">開啟透視鏡頭</button>
    </div>

    <div id="flash-bang"></div>

    <a-scene id="magic-scene" 
             mindar-image="imageTargetSrc: ./magic-cards.mind; maxTrack: 2; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF:0.001; filterBeta: 0.01;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="joker-target" mindar-image-target="targetIndex: 0"></a-entity>

        <a-entity id="x-target" mindar-image-target="targetIndex: 1">
            
            <a-entity id="magic-light-group" visible="false">
                
                <a-entity id="scaler-container" scale="5 5 5"
                          animation="property: scale; from: 5 5 5; to: 1 1 1; dur: 3000; easing: easeOutExpo; startEvents: startLocking">
                    
                    <a-plane color="#39ff14" width="0.1" height="0.1" position="-0.4 0.5 0.02" material="shader: flat;"></a-plane>
                    <a-plane color="#39ff14" width="0.1" height="0.1" position="0.4 0.5 0.02" material="shader: flat;"></a-plane>
                    <a-plane color="#39ff14" width="0.1" height="0.1" position="-0.4 -0.5 0.02" material="shader: flat;"></a-plane>
                    <a-plane color="#39ff14" width="0.1" height="0.1" position="0.4 -0.5 0.02" material="shader: flat;"></a-plane>
                    <a-ring color="#39ff14" radius-inner="0.6" radius-outer="0.62" num-segments="4" position="0 0 0.01" rotation="0 0 45"
                            material="shader: flat; transparent: true; opacity: 0.7;"
                            animation="property: rotation; from: 0 0 45; to: 0 0 405; loop: true; dur: 6000; easing: linear">
                    </a-ring>

                    <a-ring color="#39ff14" radius-inner="0.45" radius-outer="0.48" position="0 0 0.02" opacity="0.9"
                            material="shader: flat; transparent: true;"
                            animation="property: rotation; to: 0 0 360; loop: true; dur: 3000; easing: linear">
                    </a-ring>

                    <a-triangle color="#39ff14" vertex-a="0 0.2 0" vertex-b="-0.1 -0.1 0" vertex-c="0.1 -0.1 0" position="0 0 0.03" opacity="0.5"
                                material="shader: flat; transparent: true;"
                                animation="property: rotation; to: 0 0 -360; loop: true; dur: 1500; easing: linear">
                    </a-triangle>

                    <a-sphere position="0 0 0.05" radius="0.03" color="#39ff14"
                              material="shader: flat; emissive: #39ff14;"
                              animation="property: opacity; from: 0.3; to: 1; dir: alternate; loop: true; dur: 100">
                    </a-sphere>

                    <a-light type="point" color="#39ff14" intensity="2" distance="1.5" position="0 0 0.2"></a-light>

                </a-entity>
                
            </a-entity>

        </a-entity>

    </a-scene>

    <script>
        let isVibrationAllowed = false;
        let jokerFound = false;
        let xCardFound = false;
        let hasTriggeredVisual = false;
        let androidVibrateInterval = null;

        function startMagic() {
            document.getElementById('overlay').style.display = 'none';
            isVibrationAllowed = true;
            
            if(navigator.vibrate) navigator.vibrate(50); 
            
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 

            initMagicLogic();
        }

        function initMagicLogic() {
            const jokerTarget = document.getElementById('joker-target');
            const xTarget = document.getElementById('x-target');
            const lightGroup = document.getElementById('magic-light-group');
            const container = document.getElementById('scaler-container');
            const flashBang = document.getElementById('flash-bang');

            jokerTarget.addEventListener("targetFound", () => { jokerFound = true; checkConditions(); });
            jokerTarget.addEventListener("targetLost", () => { jokerFound = false; checkConditions(); });
            xTarget.addEventListener("targetFound", () => { xCardFound = true; checkConditions(); });
            xTarget.addEventListener("targetLost", () => { xCardFound = false; checkConditions(); });

            function checkConditions() {
                if (jokerFound && xCardFound) {
                    
                    if (!hasTriggeredVisual) {
                        hasTriggeredVisual = true;

                        // 顯示特效群組
                        lightGroup.setAttribute('visible', 'true');
                        
                        // 【關鍵】重設容器初始大小，並手動觸發 3 秒進場動畫
                        container.setAttribute('scale', '5 5 5');
                        container.emit('startLocking');

                        // 1. 全螢幕瞬間閃白（營造抓取到訊號的衝擊感）
                        flashBang.style.transition = "none";
                        flashBang.style.opacity = "1";
                        setTimeout(() => {
                            flashBang.style.transition = "opacity 0.5s ease-out";
                            flashBang.style.opacity = "0";
                        }, 50);

                        // 2. Android 設備啟動持續震動
                        if (isVibrationAllowed && navigator.vibrate) {
                            androidVibrateInterval = setInterval(() => {
                                navigator.vibrate(200);
                            }, 500);
                        }
                    }
                } else {
                    // 只要其中一張卡片離開畫面
                    lightGroup.setAttribute('visible', 'false');
                    
                    if (!jokerFound && !xCardFound) {
                        hasTriggeredVisual = false;
                        if(androidVibrateInterval) {
                            clearInterval(androidVibrateInterval);
                            androidVibrateInterval = null;
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
